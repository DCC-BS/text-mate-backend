services:
    vllm_gemma4:
        platform: linux/amd64
        image: vllm/vllm-openai:v0.22.1
        container_name: vllm_gemma4
        ports:
            - ${LLM_API_PORT}:8000
        environment:
            - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
        runtime: nvidia
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          device_ids: ["0"]
                          capabilities: [gpu]
        ipc: host
        volumes:
            - ${HUGGING_FACE_CACHE_DIR}:/root/.cache/huggingface
        command: >
            --port 8000
            --model nvidia/Gemma-4-26B-A4B-NVFP4
            --served-model-name Gemma/Gemma-4-31B
            --max-model-len auto
            --max-num-batched-tokens 4096
            --gpu-memory-utilization 0.90
            --enable-auto-tool-choice
            --tool-call-parser gemma4
            --chat-template examples/tool_chat_template_gemma4.jinja
            --mm-processor-kwargs '{"max_soft_tokens": 280}'
            --async-scheduling
            --tensor-parallel-size 1
            --max-num-seqs 1
            --reasoning-parser gemma4

    docling-serve:
        image: ghcr.io/docling-project/docling-serve-cu130:main
        container_name: docling-serve-text-mate
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          device_ids: ["1"]
                          capabilities: [gpu]
        ports:
            - ${DOCLING_API_PORT}:5001
        environment:
            - DOCLING_MODELS_PATH=/models
            - DOCLING_CONFIG_FILE=/app/docling_config.json
            - DOCLING_SERVE_ENABLE_UI=true
        volumes:
            - "${HOME}/.cache/docling:/models"
