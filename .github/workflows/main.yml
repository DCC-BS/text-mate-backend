name: Main

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

env:
    APP_MODE=ci
    AUTH_MODE=none

jobs:
    backend-ci:
        uses: DCC-BS/ci-workflows/.github/workflows/python-backend-ci.yml@b522a713e5f9efc19b715d0d4938f37531db7f0d # v8
        with:
            python_versions: '["3.14"]'
            quality_python_version: "3.14"
            check_command: "make check"
            uv_version: 0.9.28
